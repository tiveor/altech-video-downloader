<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#0d0d22"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2a5e"/>
      <stop offset="100%" stop-color="#1a1a48"/>
    </linearGradient>
    <linearGradient id="card2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9100"/>
      <stop offset="100%" stop-color="#FF6D00"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="22" fill="url(#bg)"/>

  <!-- Back card (offset, muted blue) -->
  <rect x="22" y="18" width="72" height="72" rx="10" fill="url(#card1)" filter="url(#shadow)" transform="rotate(-8 58 54)"/>

  <!-- Front card (red/accent) -->
  <rect x="30" y="26" width="72" height="72" rx="10" fill="url(#card2)" filter="url(#shadow)"/>

  <!-- Play triangle on front card -->
  <polygon points="54,44 82,62 54,80" fill="white" opacity="0.95"/>

  <!-- Download bar at bottom -->
  <rect x="20" y="106" width="88" height="7" rx="3.5" fill="#FF9100" opacity="0.85"/>

  <!-- Download arrow -->
  <line x1="64" y1="88" x2="64" y2="100" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <polyline points="54,94 64,104 74,94" fill="none" stroke="white" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>
</svg>
